<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1c0a26">
<title>နိုရီယူကီ မိုရီ — ပုဂံ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Myanmar:wght@500;600&family=Cormorant+Garamond:wght@500&family=Shippori+Mincho:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
  body {
    background: linear-gradient(180deg, #170826 0%, #451436 30%, #8f2440 55%, #d4542f 78%, #f49038 100%);
    font-family: 'Noto Serif Myanmar', 'Cormorant Garamond', serif;
  }
  .name-main {
    font-size: clamp(32px, 9vw, 58px);
    color: #fdf2dc;
    text-shadow: 0 0 44px rgba(250,150,70,0.55);
  }
  .name-sub { font-family: 'Cormorant Garamond', serif; color: #f6dcb4; }
  .name-extra { font-family: 'Shippori Mincho', serif; color: #e8c69a; }
</style>
</head>
<body>
<div id="bg"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }</script>
<script type="module">
import * as THREE from 'three';
import { setupUI, createApp, createParallax, canvasTexture, glowTexture } from './js/ui.js';

setupUI({
  nameMain: 'နိုရီယူကီ မိုရီ',
  nameSub: 'NORIYUKI MORI',
  nameExtra: '茂里 憲之',
  titleMain: 'ပင်မအလုပ်အကိုင်: အလုပ်လက်မဲ့',
  titleSub: 'အပိုအလုပ်: စာရေးဆရာ · သုတေသီ · ပြိုင်ပွဲသမား',
  qr: { dark: '#33140f', light: '#fff4e0', glow: 'rgba(255,170,70,0.5)' },
});

const { renderer, scene, camera } = createApp(THREE);
camera.position.set(0, 0, 26);
const parallax = createParallax();

// ---- 燃える朝陽 ----
const sun = new THREE.Sprite(new THREE.SpriteMaterial({
  map: canvasTexture(THREE, 256, (ctx, s) => {
    const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
    g.addColorStop(0, 'rgba(255,235,175,1)');
    g.addColorStop(0.26, 'rgba(255,180,85,0.95)');
    g.addColorStop(0.5, 'rgba(255,120,55,0.4)');
    g.addColorStop(1, 'rgba(255,90,50,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
  }),
  transparent: true, depthWrite: false,
}));
sun.scale.setScalar(46);
sun.position.set(-8, -5, -60);
scene.add(sun);

// ---- パゴダの平原 (Bagan stupa layers) ----
function stupa(ctx, cx, baseY, w, h) {
  // bell body
  ctx.beginPath();
  ctx.moveTo(cx - w/2, baseY);
  ctx.bezierCurveTo(cx - w/2, baseY - h*0.42, cx - w*0.16, baseY - h*0.52, cx - w*0.10, baseY - h*0.62);
  ctx.lineTo(cx + w*0.10, baseY - h*0.62);
  ctx.bezierCurveTo(cx + w*0.16, baseY - h*0.52, cx + w/2, baseY - h*0.42, cx + w/2, baseY);
  ctx.closePath(); ctx.fill();
  // spire
  ctx.beginPath();
  ctx.moveTo(cx - w*0.10, baseY - h*0.62);
  ctx.lineTo(cx, baseY - h);
  ctx.lineTo(cx + w*0.10, baseY - h*0.62);
  ctx.closePath(); ctx.fill();
  // plinth
  ctx.fillRect(cx - w*0.62, baseY, w*1.24, h*0.08);
}
function stupaLayerTexture(color, count, seed) {
  return canvasTexture(THREE, 1024, (ctx, s) => {
    ctx.fillStyle = color;
    const rnd = (n) => Math.abs(Math.sin(seed * 91.7 + n * 47.3)) % 1;
    const base = s * 0.82;
    for (let i = 0; i < count; i++) {
      const cx = s * (0.04 + 0.92 * rnd(i));
      const w = s * (0.05 + 0.075 * rnd(i + 40));
      const h = w * (2.1 + rnd(i + 80) * 1.3);
      stupa(ctx, cx, base + s * 0.04 * rnd(i + 120), w, h);
    }
    // ground band
    ctx.fillRect(0, base + s * 0.05, s, s * 0.13);
  });
}
const stupaLayers = [
  { color: 'rgba(150,80,110,0.75)', count: 10, z: -52, y: -3,  w: 130 },
  { color: 'rgba(96,42,70,0.9)',    count: 8,  z: -38, y: -6,  w: 105 },
  { color: 'rgba(38,14,28,1)',      count: 6,  z: -22, y: -10, w: 80 },
].map((L, i) => {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(L.w, L.w),
    new THREE.MeshBasicMaterial({ map: stupaLayerTexture(L.color, L.count, i + 3), transparent: true, depthWrite: false })
  );
  m.position.set(0, L.y + L.w * 0.32 - L.w * 0.5 + 10, L.z);
  scene.add(m);
  return m;
});

// ---- 気球 (hot air balloons — the dynamic icon of Bagan) ----
const balloonTex = canvasTexture(THREE, 128, (ctx, s) => {
  // envelope
  const g = ctx.createRadialGradient(s*0.42, s*0.32, s*0.05, s*0.5, s*0.38, s*0.4);
  g.addColorStop(0, 'rgba(255,215,150,1)');
  g.addColorStop(0.5, 'rgba(235,120,60,0.98)');
  g.addColorStop(1, 'rgba(140,40,40,0.95)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(s*0.5, s*0.04);
  ctx.bezierCurveTo(s*0.92, s*0.05, s*0.92, s*0.55, s*0.58, s*0.72);
  ctx.lineTo(s*0.58, s*0.78);
  ctx.lineTo(s*0.42, s*0.78);
  ctx.lineTo(s*0.42, s*0.72);
  ctx.bezierCurveTo(s*0.08, s*0.55, s*0.08, s*0.05, s*0.5, s*0.04);
  ctx.fill();
  // vertical gores
  ctx.strokeStyle = 'rgba(90,20,25,0.5)';
  ctx.lineWidth = 1.5;
  for (const u of [0.3, 0.42, 0.58, 0.7]) {
    ctx.beginPath();
    ctx.moveTo(s*0.5, s*0.04);
    ctx.quadraticCurveTo(s*u, s*0.4, s*(0.42 + (u > 0.5 ? 0.16 : 0)), s*0.74);
    ctx.stroke();
  }
  // basket
  ctx.fillStyle = 'rgba(40,18,16,0.98)';
  ctx.fillRect(s*0.44, s*0.86, s*0.12, s*0.08);
  ctx.strokeStyle = 'rgba(40,18,16,0.9)';
  ctx.beginPath(); ctx.moveTo(s*0.44, s*0.86); ctx.lineTo(s*0.43, s*0.78); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*0.56, s*0.86); ctx.lineTo(s*0.57, s*0.78); ctx.stroke();
});
const balloons = [];
for (let i = 0; i < 9; i++) {
  const near = i < 3;
  const b = new THREE.Sprite(new THREE.SpriteMaterial({
    map: balloonTex, transparent: true, depthWrite: false,
  }));
  const sc = near ? 4.5 + Math.random() * 2.5 : 1.4 + Math.random() * 1.8;
  b.scale.setScalar(sc);
  b.position.set(
    (Math.random() - 0.5) * 50,
    -14 + Math.random() * 30,
    near ? -14 - Math.random() * 6 : -34 - Math.random() * 14
  );
  b.userData = {
    rise: near ? 0.7 + Math.random() * 0.5 : 0.25 + Math.random() * 0.3,
    drift: 0.3 + Math.random() * 0.6,
    ph: Math.random() * 6.28,
    glow: near,
  };
  balloons.push(b); scene.add(b);
  if (near) {
    // burner glow under the near balloons
    const gl = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTexture(THREE, 'rgba(255,190,90,1)'),
      transparent: true, opacity: 0.0, depthWrite: false, blending: THREE.AdditiveBlending,
    }));
    gl.scale.setScalar(sc * 0.5);
    b.userData.burner = gl;
    scene.add(gl);
  }
}

// ---- 鳥の群れ (sweeping flock) ----
const birdTex = canvasTexture(THREE, 64, (ctx, s) => {
  ctx.strokeStyle = 'rgba(30,10,22,0.95)';
  ctx.lineWidth = s * 0.09;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(s*0.06, s*0.42);
  ctx.quadraticCurveTo(s*0.28, s*0.18, s*0.5, s*0.5);
  ctx.quadraticCurveTo(s*0.72, s*0.18, s*0.94, s*0.42);
  ctx.stroke();
});
const BIRDS = 26;
const birdGeo = new THREE.PlaneGeometry(1, 1);
const birdMat = new THREE.MeshBasicMaterial({
  map: birdTex, transparent: true, depthWrite: false, side: THREE.DoubleSide,
});
const birds = new THREE.InstancedMesh(birdGeo, birdMat, BIRDS);
const BD = [];
for (let i = 0; i < BIRDS; i++) {
  BD.push({
    ox: (Math.random() - 0.5) * 14,
    oy: (Math.random() - 0.5) * 5,
    oz: (Math.random() - 0.5) * 6,
    flap: 6 + Math.random() * 4,
    ph: Math.random() * 6.28,
    s: 0.6 + Math.random() * 0.7,
  });
}
scene.add(birds);
const dummy = new THREE.Object3D();

// ---- 疾走する朝霧 (fast low mist) ----
const mistTex = glowTexture(THREE, 'rgba(255,190,140,0.7)');
const mists = [];
for (let i = 0; i < 8; i++) {
  const m = new THREE.Sprite(new THREE.SpriteMaterial({
    map: mistTex, transparent: true, opacity: 0.08 + Math.random() * 0.08, depthWrite: false,
  }));
  m.scale.set(30 + Math.random() * 24, 5 + Math.random() * 5, 1);
  m.position.set((Math.random() - 0.5) * 60, -13 + Math.random() * 8, -18 - Math.random() * 24);
  m.userData.speed = 1.2 + Math.random() * 1.8;
  mists.push(m); scene.add(m);
}

// ---- 金の砂塵 ----
const moteTex = glowTexture(THREE, 'rgba(255,200,120,1)');
const MOTES = 130;
const mDat = [];
const mPos = new Float32Array(MOTES * 3);
for (let i = 0; i < MOTES; i++) {
  mDat.push({
    x: (Math.random() - 0.5) * 54, y: -16 + Math.random() * 32, z: -28 + Math.random() * 22,
    rise: 0.3 + Math.random() * 0.7, ph: Math.random() * 6.28, sw: 0.4 + Math.random() * 0.8,
  });
}
const mGeo = new THREE.BufferGeometry();
mGeo.setAttribute('position', new THREE.BufferAttribute(mPos, 3));
const motes = new THREE.Points(mGeo, new THREE.PointsMaterial({
  map: moteTex, size: 0.4, transparent: true, opacity: 0.65,
  depthWrite: false, blending: THREE.AdditiveBlending, color: 0xffce8c,
}));
scene.add(motes);

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.getElapsedTime();
  parallax.update();

  sun.material.opacity = 0.9 + Math.sin(t * 1.1) * 0.08;

  balloons.forEach((b) => {
    const d = b.userData;
    b.position.y += d.rise * dt;
    b.position.x += Math.sin(t * 0.25 + d.ph) * d.drift * dt;
    if (b.position.y > 20) { b.position.y = -16; b.position.x = (Math.random() - 0.5) * 50; }
    if (d.burner) {
      d.burner.position.copy(b.position);
      d.burner.position.y -= b.scale.y * 0.18;
      // intermittent burner flame
      const firing = Math.sin(t * 0.9 + d.ph * 3) > 0.55;
      d.burner.material.opacity += ((firing ? 0.55 : 0.05) - d.burner.material.opacity) * 0.12;
    }
  });

  // flock sweeps across the sky in a shallow arc
  const fx = -44 + ((t * 7) % 108);
  const fy = 9 + Math.sin(t * 0.5) * 5;
  for (let i = 0; i < BIRDS; i++) {
    const d = BD[i];
    const flap = 0.35 + Math.abs(Math.sin(t * d.flap + d.ph)) * 0.85;
    dummy.position.set(fx + d.ox, fy + d.oy + Math.sin(t * 1.6 + d.ph) * 0.5, -20 + d.oz);
    dummy.rotation.set(0, 0, Math.sin(t * d.flap + d.ph) * 0.1);
    dummy.scale.set(d.s, d.s * flap, 1);
    dummy.updateMatrix();
    birds.setMatrixAt(i, dummy.matrix);
  }
  birds.instanceMatrix.needsUpdate = true;

  mists.forEach((m) => {
    m.position.x += m.userData.speed * dt;
    if (m.position.x > 38) m.position.x = -38;
  });

  const pos = motes.geometry.attributes.position.array;
  for (let i = 0; i < MOTES; i++) {
    const d = mDat[i];
    d.y += d.rise * dt;
    if (d.y > 16) d.y = -16;
    pos[i*3]   = d.x + Math.sin(t * d.sw + d.ph) * 1.2;
    pos[i*3+1] = d.y;
    pos[i*3+2] = d.z;
  }
  motes.geometry.attributes.position.needsUpdate = true;

  camera.position.x = parallax.x * 3.2;
  camera.position.y = -parallax.y * 2.2;
  camera.lookAt(0, 0, -22);
  renderer.render(scene, camera);
});
</script>
</body>
</html>
