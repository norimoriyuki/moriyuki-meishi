<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#02161e">
<title>නොරියුකි මොරි — නෙළුම්</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Sinhala:wght@500;600&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
  body {
    background: linear-gradient(180deg, #021019 0%, #032833 40%, #06424a 75%, #0a565a 100%);
    font-family: 'Noto Serif Sinhala', 'Cormorant Garamond', serif;
  }
  .name-main {
    font-size: clamp(34px, 9.5vw, 62px);
    color: #eafcfa;
    text-shadow: 0 0 36px rgba(60,220,210,0.4);
  }
  .name-sub, .name-extra { font-family: 'Cormorant Garamond', serif; color: #cfeee9; }
  .country-nav a.active { color: #6fe3d6; opacity: 1; border-color: #6fe3d6; }
</style>
</head>
<body>
<div id="bg"></div>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }</script>
<script type="module">
import * as THREE from 'three';
import { setupUI, createApp, createParallax, canvasTexture, glowTexture } from './js/ui.js';

setupUI({
  current: 'lk',
  nameMain: 'නොරියුකි මොරි',
  nameSub: 'NORIYUKI MORI',
  nameExtra: '茂里 憲之',
  titleMain: 'ප්‍රධාන රැකියාව: රැකියා විරහිත',
  titleSub: 'අතුරු රැකියා: ලේඛක · පර්යේෂක · ද්වන්ධ සටන්කරු',
  qr: { dark: '#063238', light: '#eefffb', glow: 'rgba(80,220,205,0.4)' },
});

const { renderer, scene, camera } = createApp(THREE);
camera.position.set(0, 2, 24);
const parallax = createParallax();

// ---- 青睡蓮 (nil manel — blue water lily) ----
const petalTex = canvasTexture(THREE, 128, (ctx, s) => {
  const g = ctx.createLinearGradient(s/2, s, s/2, 0);
  g.addColorStop(0, 'rgba(240,250,255,0.95)');
  g.addColorStop(0.4, 'rgba(120,170,255,0.9)');
  g.addColorStop(0.8, 'rgba(90,110,235,0.85)');
  g.addColorStop(1, 'rgba(120,80,220,0.0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(s/2, s);
  ctx.bezierCurveTo(s*0.1, s*0.75, s*0.16, s*0.28, s/2, 0);
  ctx.bezierCurveTo(s*0.84, s*0.28, s*0.9, s*0.75, s/2, s);
  ctx.fill();
});
const lotus = new THREE.Group();
function petalRing(count, len, tilt, yOff, opacity) {
  for (let i = 0; i < count; i++) {
    const p = new THREE.Mesh(
      new THREE.PlaneGeometry(len * 0.55, len),
      new THREE.MeshBasicMaterial({
        map: petalTex, transparent: true, opacity,
        depthWrite: false, side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
      })
    );
    const pivot = new THREE.Group();
    p.position.y = len / 2;
    p.rotation.x = tilt;
    pivot.add(p);
    pivot.rotation.y = (i / count) * Math.PI * 2 + (tilt < -0.5 ? 0.3 : 0);
    pivot.position.y = yOff;
    lotus.add(pivot);
  }
}
petalRing(9, 6.4, -1.05, 0.0, 0.75);  // outer, open wide
petalRing(8, 5.4, -0.65, 0.2, 0.85);  // middle
petalRing(6, 4.0, -0.30, 0.4, 0.95);  // inner, upright
// golden heart
const heart = new THREE.Sprite(new THREE.SpriteMaterial({
  map: glowTexture(THREE, 'rgba(255,214,110,1)'),
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
}));
heart.scale.setScalar(4.5);
heart.position.y = 1.2;
lotus.add(heart);
// under-glow on water
const underGlow = new THREE.Sprite(new THREE.SpriteMaterial({
  map: glowTexture(THREE, 'rgba(80,140,255,0.9)'),
  transparent: true, opacity: 0.5, depthWrite: false, blending: THREE.AdditiveBlending,
}));
underGlow.scale.set(20, 7, 1);
underGlow.position.y = -0.8;
lotus.add(underGlow);
lotus.position.set(0, -7.5, -4);
scene.add(lotus);

// ---- 波紋 (ripples) ----
const rippleMat = () => new THREE.MeshBasicMaterial({
  color: 0x7de8dc, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false,
});
const ripples = [];
for (let i = 0; i < 3; i++) {
  const r = new THREE.Mesh(new THREE.RingGeometry(0.98, 1, 64), rippleMat());
  r.rotation.x = -Math.PI / 2;
  r.position.set(0, -8.3, -4);
  r.userData.t0 = i * 2.4;
  ripples.push(r); scene.add(r);
}

// ---- 蛍 (fireflies) ----
const flyTex = glowTexture(THREE, 'rgba(170,255,230,1)');
const FLIES = 160;
const fPos = new Float32Array(FLIES * 3);
const fDat = [];
for (let i = 0; i < FLIES; i++) {
  fDat.push({
    x: (Math.random() - 0.5) * 46, y: -10 + Math.random() * 28, z: -30 + Math.random() * 28,
    ph: Math.random() * 6.28, sp: 0.3 + Math.random() * 0.6, r: 0.5 + Math.random() * 1.5,
  });
}
const fGeo = new THREE.BufferGeometry();
fGeo.setAttribute('position', new THREE.BufferAttribute(fPos, 3));
const flies = new THREE.Points(fGeo, new THREE.PointsMaterial({
  map: flyTex, size: 0.6, transparent: true, opacity: 0.8,
  depthWrite: false, blending: THREE.AdditiveBlending, color: 0x9fffe0,
}));
scene.add(flies);

// ---- 光の柱 (light shafts) ----
for (let i = 0; i < 3; i++) {
  const shaft = new THREE.Mesh(
    new THREE.PlaneGeometry(5 + i * 2, 40),
    new THREE.MeshBasicMaterial({
      map: canvasTexture(THREE, 128, (ctx, s) => {
        const g = ctx.createLinearGradient(0, 0, 0, s);
        g.addColorStop(0, 'rgba(140,230,220,0.30)');
        g.addColorStop(1, 'rgba(140,230,220,0)');
        ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
      }),
      transparent: true, opacity: 0.35, depthWrite: false, blending: THREE.AdditiveBlending,
    })
  );
  shaft.position.set(-14 + i * 13, 6, -26);
  shaft.rotation.z = 0.18 - i * 0.14;
  scene.add(shaft);
}

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const t = clock.getElapsedTime();
  parallax.update();

  lotus.position.y = -7.5 + Math.sin(t * 0.7) * 0.35;
  lotus.rotation.y = t * 0.1;
  heart.material.opacity = 0.75 + Math.sin(t * 1.8) * 0.25;

  ripples.forEach((r) => {
    const life = ((t + r.userData.t0) % 7.2) / 7.2;
    const s = 1 + life * 17;
    r.scale.set(s, s, 1);
    r.material.opacity = life < 0.08 ? life * 5 : Math.max(0, 0.4 * (1 - life));
  });

  const pos = flies.geometry.attributes.position.array;
  for (let i = 0; i < FLIES; i++) {
    const d = fDat[i];
    pos[i*3]   = d.x + Math.sin(t * d.sp + d.ph) * d.r;
    pos[i*3+1] = d.y + Math.sin(t * d.sp * 0.8 + d.ph * 2) * d.r * 0.7;
    pos[i*3+2] = d.z + Math.cos(t * d.sp * 0.6 + d.ph) * d.r;
  }
  flies.geometry.attributes.position.needsUpdate = true;
  flies.material.opacity = 0.6 + Math.sin(t * 2.2) * 0.2;

  camera.position.x = parallax.x * 3;
  camera.position.y = 2 - parallax.y * 2;
  camera.lookAt(0, -2, -8);
  renderer.render(scene, camera);
});
</script>
</body>
</html>
